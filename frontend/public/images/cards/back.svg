    <rect x="-30" y="-30" width="60" height="60" rx="4" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" transform="rotate(45)"/>
    <rect x="-18" y="-18" width="36" height="36" rx="2" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" transform="rotate(45)"/>
  </g>
