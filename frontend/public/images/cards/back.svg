<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2818"/>
      <stop offset="50%" stop-color="#1a4a2a"/>
      <stop offset="100%" stop-color="#0d2818"/>
