    <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 0l8 8M8 0l-8 8" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="140" height="200" rx="6" fill="url(#bg)"/>
  <rect width="140" height="200" rx="6" fill="url(#crosshatch)"/>
  <rect x="10" y="10" width="120" height="180" rx="8" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <rect x="20" y="20" width="100" height="160" rx="4" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
